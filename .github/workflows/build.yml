name: build-actual-namesort

# Manual trigger. Bump "version" each time you track a new Actual release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Actual release version (no leading v), e.g. 26.5.2"
        required: true
        default: "26.5.2"
      platforms:
        description: "Target arch for your Pi: linux/arm/v7 (32-bit) or linux/arm64 (64-bit). Check with `uname -m` on the Pi: armv7l->arm/v7, aarch64->arm64."
        required: true
        default: "linux/arm/v7"

permissions:
  contents: read
  packages: write   # needed to push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (this repo = Dockerfile + patch)
        uses: actions/checkout@v4

      # QEMU lets the runner produce ARM images; buildx orchestrates it.
      # The Dockerfile pins the heavy build stage to the runner's native
      # arch (--platform=$BUILDPLATFORM), so only the trivial final COPY
      # stage is emulated.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push patched image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          build-args: |
            VERSION=${{ inputs.version }}
          tags: ghcr.io/${{ github.repository_owner }}/actual-server-namesort:${{ inputs.version }}
          push: true
          # Layer caching via the GitHub Actions cache backend.
          # mode=max caches intermediate (builder-stage) layers too, not just
          # the final image — that's where yarn install / build:browser live.
          # Big win when re-running the SAME version; modest on version bumps
          # (the git-clone layer changes and busts everything after it).
          cache-from: type=gha
          cache-to: type=gha,mode=max

# After a successful run:
#   - In GitHub > your profile > Packages, set this package to Public
#     (so the Pi can pull without auth), OR `docker login ghcr.io` on the
#     Pi with a read:packages PAT.
#   - On the Pi, point compose at:
#       image: ghcr.io/<your-username>/actual-server-namesort:26.5.2
#     and `docker compose pull && docker compose up -d`.